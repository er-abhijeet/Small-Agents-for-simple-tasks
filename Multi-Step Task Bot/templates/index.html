<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Step Task Bot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for a sleeker look */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .markdown-body p { margin-bottom: 0.75rem; }
    </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col font-sans">

    <header class="bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-center shadow-sm">
        <div>
            <h1 class="text-xl font-semibold text-gray-800">Task Assistant</h1>
            <p class="text-sm text-gray-500">Structured workflow execution</p>
        </div>
        <div class="flex items-center gap-2">
            <span class="text-xs font-medium text-gray-400 uppercase tracking-wider">Current State:</span>
            <span id="state-badge" class="px-3 py-1 bg-blue-100 text-blue-700 text-xs font-bold rounded-full border border-blue-200">
                PLANNING
            </span>
        </div>
    </header>

    <main class="flex-1 overflow-hidden flex flex-col max-w-4xl w-full mx-auto p-4">
        <div id="chat-box" class="flex-1 overflow-y-auto bg-white rounded-xl shadow-sm border border-gray-200 p-6 flex flex-col gap-4 mb-4">
            <div class="flex justify-start">
                <div class="bg-gray-100 text-gray-800 rounded-2xl rounded-tl-sm px-5 py-3 max-w-[80%] shadow-sm">
                    Bot initialized. What task would you like to plan?
                </div>
            </div>
        </div>

        <div class="bg-white p-2 rounded-xl shadow-sm border border-gray-200 flex items-center gap-2 focus-within:ring-2 focus-within:ring-blue-500 focus-within:border-transparent transition-all">
            <input type="text" id="user-input" 
                class="flex-1 bg-transparent px-4 py-2 outline-none text-gray-700 placeholder-gray-400" 
                placeholder="Type your request here..."
                autocomplete="off">
            <button id="send-btn" 
                class="bg-blue-600 hover:bg-blue-700 text-white p-2 rounded-lg transition-colors flex items-center justify-center w-10 h-10 disabled:opacity-50">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5">
                    <path d="M3.478 2.404a.75.75 0 0 0-.926.941l2.432 7.905H13.5a.75.75 0 0 1 0 1.5H4.984l-2.432 7.905a.75.75 0 0 0 .926.94 60.519 60.519 0 0 0 18.445-8.986.75.75 0 0 0 0-1.218A60.517 60.517 0 0 0 3.478 2.404Z" />
                </svg>
            </button>
        </div>
    </main>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const stateBadge = document.getElementById('state-badge');

        function appendMessage(sender, text) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'}`;
            
            const bubble = document.createElement('div');
            bubble.className = sender === 'user' 
                ? 'bg-blue-600 text-white rounded-2xl rounded-tr-sm px-5 py-3 max-w-[80%] shadow-sm'
                : 'bg-gray-100 text-gray-800 rounded-2xl rounded-tl-sm px-5 py-3 max-w-[80%] shadow-sm markdown-body';
            
            // Format basic markdown (line breaks to <br>)
            bubble.innerHTML = text.replace(/\n/g, '<br>');
            
            wrapper.appendChild(bubble);
            chatBox.appendChild(wrapper);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            // UI updates
            appendMessage('user', message);
            userInput.value = '';
            userInput.disabled = true;
            sendBtn.disabled = true;

            // Loading indicator
            const loadingId = 'loading-' + Date.now();
            const loadingHtml = `
                <div id="${loadingId}" class="flex justify-start">
                    <div class="bg-gray-100 text-gray-500 rounded-2xl rounded-tl-sm px-5 py-3 shadow-sm flex items-center gap-1">
                        <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce"></div>
                        <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
                        <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.4s"></div>
                    </div>
                </div>`;
            chatBox.insertAdjacentHTML('beforeend', loadingHtml);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();
                
                // Remove loading
                document.getElementById(loadingId).remove();

                if (response.ok) {
                    appendMessage('bot', data.reply);
                    // Update State UI
                    stateBadge.textContent = data.state;
                    
                    // Add subtle animation to state badge when it changes
                    stateBadge.classList.add('scale-110', 'bg-blue-200');
                    setTimeout(() => stateBadge.classList.remove('scale-110', 'bg-blue-200'), 300);
                } else {
                    appendMessage('bot', 'Error: ' + (data.error || 'Server failed to respond.'));
                }
            } catch (err) {
                document.getElementById(loadingId).remove();
                appendMessage('bot', 'Network error occurred.');
            } finally {
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
